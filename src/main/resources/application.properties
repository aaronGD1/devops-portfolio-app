# Server
server.port=8081    

# H2 Database (in-memory, swap to MySQL/PostgreSQL for production)
spring.datasource.url=jdbc:h2:file:./data/portfoliodb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# H2 Console (dev only - disable in prod)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# File Upload settings
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

# Static resource handling (serves uploaded files)
spring.web.resources.static-locations=classpath:/static/,file:./uploads/
spring.mvc.static-path-pattern=/uploads/**

# Thymeleaf
spring.thymeleaf.cache=false

# Logging
logging.level.com.portfolio=DEBUG
