<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Welcome — Setup Your Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    body {
      font-family: 'DM Sans', sans-serif;
      background: #0d0d0d;
      color: white;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .setup-card {
      text-align: center;
      max-width: 520px;
      padding: 3rem;
      animation: fadeIn 0.6s ease;
    }
    .setup-icon { font-size: 4rem; margin-bottom: 1.5rem; }
    h1 { font-family: 'Playfair Display', serif; font-size: 2.8rem; font-weight: 700; margin-bottom: 1rem; }
    p { color: rgba(255,255,255,0.6); font-size: 1.05rem; line-height: 1.7; margin-bottom: 2.5rem; }
    .btn {
      display: inline-block;
      background: #c8602a; color: white;
      padding: 1rem 2.5rem;
      border-radius: 8px; font-size: 1rem; font-weight: 500;
      text-decoration: none;
      transition: all 0.2s;
    }
    .btn:hover { background: #a84f22; transform: translateY(-3px); box-shadow: 0 10px 40px rgba(200,96,42,0.4); }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div class="setup-card">
    <div class="setup-icon">🚀</div>
    <h1>Welcome to Your Portfolio</h1>
    <p>Your portfolio is empty! Let's set it up with your details, photo, resume, skills, and projects. It only takes a few minutes.</p>
    <a href="/edit" class="btn">Create My Portfolio →</a>
  </div>
</body>
</html>
